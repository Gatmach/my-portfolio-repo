<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary SEO -->
    <title>Gatmach Yuol | Full-Stack Software Engineer & AI Developer</title>

    <meta
      name="description"
      content="Portfolio of Gatmach Yuol, a Full-Stack Software Engineer and AI Developer specializing in React, Django, FastAPI, Machine Learning, TensorFlow, PostgreSQL, and modern web applications."
    />

    <meta
      name="keywords"
      content="Gatmach Yuol, Software Engineer, Full-Stack Developer, AI Engineer, Machine Learning, React, Django, FastAPI, TensorFlow, PostgreSQL, Portfolio"
    />

    <meta
      name="author"
      content="Gatmach Yuol"
    />

    <meta
      name="robots"
      content="index, follow"
    />

    <meta
      name="theme-color"
      content="#0f172a"
    />

    <!-- Canonical (Update after deployment) -->
    <link
      rel="canonical"
      href="https://my-portfolio-repo-eta.vercel.app"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/webp"
      href="/favicon.webp"
    />

    <!-- Fallback -->
    <link
      rel="alternate icon"
      type="image/png"
      href="/favicon.png"
    />

    <!-- Open Graph -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:site_name"
      content="Gatmach Yuol Portfolio"
    />

    <meta
      property="og:title"
      content="Gatmach Yuol | Full-Stack Software Engineer & AI Developer"
    />

    <meta
      property="og:description"
      content="Explore my software engineering, AI, and machine learning projects."
    />

    <meta
      property="og:image"
      content="https://my-portfolio-repo-eta.vercel.app/og-image.webp"
    />

    <meta
      property="og:url"
      content="https://my-portfolio-repo-eta.vercel.app/"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Gatmach Yuol | Full-Stack Software Engineer & AI Developer"
    />

    <meta
      name="twitter:description"
      content="Explore my software engineering, AI, and machine learning projects."
    />

    <meta
      name="twitter:image"
      content="https://my-portfolio-repo-eta.vercel.app/og-image.webp"
    />

    <!-- Performance -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
